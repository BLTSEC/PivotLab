---
# Windows jump box role — provides Responder/LLMNR poisoning initial access

# --- .NET 4.8 (required for Chocolatey 2.x) ---
- name: Check if .NET 4.8 already installed
  ansible.windows.win_reg_stat:
    path: HKLM:\Software\Microsoft\NET Framework Setup\NDP\v4\Full
    name: Release
  register: dotnet48__release_registered

- name: Download and Install Microsoft .NET Framework 4.8
  block:
    - name: Download .NET Framework 4.8 installer
      ansible.windows.win_get_url:
        url: "https://download.microsoft.com/download/f/3/a/f3a6af84-da23-40a5-8d1c-49cc10c8e76f/NDP48-x86-x64-AllOS-ENU.exe"
        dest: "C:\\Windows\\Temp\\dotnet48.exe"
    - name: Install .NET Framework 4.8
      ansible.windows.win_command: "C:\\Windows\\Temp\\dotnet48.exe setup /passive /norestart /log C:\\Windows\\Temp\\dotnet_install.log"
      register: result
      failed_when: result.rc not in [0, 3010]
    - name: Reboot the machine to complete .NET installation
      ansible.windows.win_reboot:
  when: (dotnet48__release_registered.raw_value is not defined or
        (dotnet48__release_registered.raw_value is defined and
         dotnet48__release_registered.raw_value < 528040))

# --- OpenSSH ---
- name: Install OpenSSH via Chocolatey
  chocolatey.chocolatey.win_chocolatey:
    name: openssh
    package_params: /SSHServerFeature
    state: present

# --- IIS for ASPX webshell pivoting (suo5, etc.) ---
- name: Install IIS web server
  ansible.windows.win_feature:
    name:
      - Web-Server
      - Web-Asp-Net45
    state: present
    include_management_tools: yes

# --- Disable password complexity (same approach as Ludus DC config) ---
- name: Disable password complexity
  community.windows.win_security_policy:
    section: System Access
    key: PasswordComplexity
    value: 0

# --- Service account for Responder bait ---
- name: Create {{ responder_user }} user
  ansible.windows.win_user:
    name: "{{ responder_user }}"
    password: "{{ responder_password }}"
    state: present
    groups:
      - Users
      - Administrators

# --- SSH key access for admin/reset ---
- name: Copy kali SSH public key to authorized_keys
  ansible.windows.win_copy:
    src: "/tmp/kali_id_rsa.pub"
    dest: "C:\\ProgramData\\ssh\\administrators_authorized_keys"

- name: Set permissions on authorized_keys
  ansible.windows.win_command: 'icacls C:\ProgramData\ssh\administrators_authorized_keys /inheritance:r /grant "Administrators:F" /grant "SYSTEM:F"'

# --- Disable Windows Defender (standalone, no AD/GPO) ---
- name: Copy Defender disable script
  ansible.windows.win_copy:
    src: disable_defender.ps1
    dest: C:\Windows\Temp\disable_defender.ps1

- name: Run Defender disable script
  ansible.windows.win_shell: "C:\\Windows\\Temp\\disable_defender.ps1"
  args:
    executable: powershell.exe

# --- LLMNR bait scheduled task ---
- name: Create scheduled task for LLMNR traffic
  community.windows.win_scheduled_task:
    name: BackupShare_Check
    description: "Checks backup share availability"
    actions:
      - path: cmd.exe
        arguments: '/c dir {{ responder_target_share }}'
    triggers:
      - type: registration
        repetition:
          interval: "PT{{ responder_interval_minutes }}M"
    username: "{{ responder_user }}"
    password: "{{ responder_password }}"
    logon_type: password
    run_level: limited
    state: present
    enabled: yes
