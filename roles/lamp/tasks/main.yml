---
# tasks file for dynamic_motd.  I have no idea where this format came from
- name: Copy dynamic motd template
  template:
    src: motd.j2
    dest: /etc/motd
  become: yes
- name: Add public key from kali
  ansible.posix.authorized_key:
    user: "root"
    state: present
    key: "{{ lookup('file', '/tmp/kali_id_rsa.pub') }}"
- name: Create webadmin user for brute force exercise
  ansible.builtin.user:
    name: webadmin
    password: "{{ 'shadow' | password_hash('sha512') }}"
    shell: /bin/bash
    groups: sudo
    append: yes
    state: present

- name: Install utilities
  ansible.builtin.package:
    name: 
      - netcat-openbsd
      - wget
      - curl
      - tcpdump
      - socat
      - iptables
    state: present
